<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="600" fill="#0f172a"/>
  <text x="400" y="40" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="bold">Binary Search Pyramid</text>

  <!-- Pyramid outline: apex (400,80), base (130,480)-(670,480) -->
  <!-- cuts at y=200 (top/mid boundary) and y=340 (mid/bottom boundary) -->

  <!-- ===== LEVEL 3 (top, smallest): found ===== -->
  <polygon points="400,80 319,200 481,200" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" fill="#bbf7d0" font-size="14" font-weight="bold">FOUND</text>
  <text x="400" y="183" text-anchor="middle" fill="#bbf7d0" font-size="12">mid == target</text>

  <!-- ===== LEVEL 2 (middle): go left / go right, straight vertical divider ===== -->
  <polygon points="319,200 481,200 575.5,340 224.5,340" fill="#7c2d12" stroke="#f97316" stroke-width="2"/>
  <line x1="400" y1="200" x2="400" y2="340" stroke="#0f172a" stroke-width="2.5"/>
  <text x="335" y="278" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="bold">target &lt; arr[mid]</text>
  <text x="335" y="296" text-anchor="middle" fill="#fed7aa" font-size="11">search left half</text>
  <text x="465" y="278" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="bold">target &gt; arr[mid]</text>
  <text x="465" y="296" text-anchor="middle" fill="#fed7aa" font-size="11">search right half</text>

  <!-- ===== LEVEL 1 (bottom, biggest): low / mid / high, straight vertical dividers ===== -->
  <polygon points="224.5,340 575.5,340 670,480 130,480" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <line x1="310" y1="340" x2="310" y2="480" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="490" y1="340" x2="490" y2="480" stroke="#0f172a" stroke-width="2.5"/>
  <text x="245" y="415" text-anchor="middle" fill="#bfdbfe" font-size="14" font-weight="bold">low</text>
  <text x="245" y="434" text-anchor="middle" fill="#93c5fd" font-size="12">minimum index</text>
  <text x="400" y="415" text-anchor="middle" fill="#c7d2fe" font-size="14" font-weight="bold">mid</text>
  <text x="400" y="434" text-anchor="middle" fill="#a5b4fc" font-size="12">(low + high) / 2</text>
  <text x="555" y="415" text-anchor="middle" fill="#bfdbfe" font-size="14" font-weight="bold">high</text>
  <text x="555" y="434" text-anchor="middle" fill="#93c5fd" font-size="12">maximum index</text>

  <!-- callout to the right of level 2 -->
  <line x1="575.5" y1="270" x2="640" y2="270" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="645" y="250" fill="#cbd5e1" font-size="13" font-weight="bold">This step repeats:</text>
  <text x="645" y="268" fill="#94a3b8" font-size="12">recompute mid in the new</text>
  <text x="645" y="284" fill="#94a3b8" font-size="12">low/high range, then check</text>
  <text x="645" y="300" fill="#94a3b8" font-size="12">again, until mid == target</text>

  <!-- step labels on the left -->
  <text x="60" y="155" fill="#22c55e" font-size="13" font-weight="bold">Step 3</text>
  <text x="60" y="270" fill="#f97316" font-size="13" font-weight="bold">Step 2</text>
  <text x="60" y="415" fill="#3b82f6" font-size="13" font-weight="bold">Step 1</text>

  <!-- pyramid outer outline for crispness -->
  <polygon points="400,80 130,480 670,480" fill="none" stroke="#475569" stroke-width="1.5"/>

  <text x="400" y="525" text-anchor="middle" fill="#64748b" font-size="13">Start wide (low, mid, high) → narrow the range each pass → converge at the top (found)</text>
</svg>
